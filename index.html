<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DLRG Landau - Services</title>
    <script>
        function redirectBasedOnParams() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Check if this is a password reset
            if (urlParams.has('userId') && urlParams.has('secret') && !urlParams.has('teamId')) {
                window.location.href = 'password-reset.html' + window.location.search;
            } 
            // Check if this is a team invitation
            else if (urlParams.has('membershipId') && urlParams.has('teamId')) {
                window.location.href = 'team-invite.html' + window.location.search;
            }
            // Default landing page
            else {
                document.getElementById('content').style.display = 'block';
            }
        }
        
        window.onload = redirectBasedOnParams;
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #003370; /* DLRG blue */
        }
        .logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div id="content" class="container" style="display: none;">
        <img src="https://www.dlrg.de/fileadmin/user_upload/DLRG-Logo.png" alt="DLRG Logo" class="logo">
        <h1>DLRG Landau Services</h1>
        <p>Diese Seite ist für Passwort-Resets und Team-Einladungen der DLRG Landau App.</p>
        <p>Wenn Sie diese Seite direkt aufrufen, sind Sie wahrscheinlich einem fehlerhaften Link gefolgt.</p>
    </div>
</body>
</html>
