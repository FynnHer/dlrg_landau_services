<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLRG Landau - Passwort zurücksetzen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }
        h1 {
            color: #003370; /* DLRG blue */
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #003370; /* DLRG blue */
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #002255;
        }
        .message {
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Passwort zurücksetzen</h1>
        <p>Bitte geben Sie ein neues Passwort ein.</p>
        
        <div id="resetForm">
            <div class="form-group">
                <label for="password">Neues Passwort</label>
                <input type="password" id="password" minlength="8" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Passwort bestätigen</label>
                <input type="password" id="confirmPassword" minlength="8" required>
            </div>
            <button type="button" onclick="resetPassword()">Passwort zurücksetzen</button>
        </div>
        
        <div id="successMessage" class="message success">
            Ihr Passwort wurde erfolgreich zurückgesetzt. Sie können sich jetzt mit Ihrem neuen Passwort anmelden.
        </div>
        
        <div id="errorMessage" class="message error"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const secret = urlParams.get('secret');
        
        if (!userId || !secret) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('errorMessage').textContent = 'Ungültiger Link. Bitte fordern Sie einen neuen Reset-Link an.';
            document.getElementById('errorMessage').style.display = 'block';
        }
        
        function resetPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                document.getElementById('errorMessage').textContent = 'Die Passwörter stimmen nicht überein.';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            if (password.length < 8) {
                document.getElementById('errorMessage').textContent = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            // Initialize Appwrite
            const appwrite = new Appwrite();
            appwrite
                .setEndpoint('http://89.58.51.96/v1') // Use your Appwrite endpoint
                .setProject('67dd9c47001a0503d8b6'); // Use your Appwrite project ID
            
            const account = appwrite.account;
            
            // Complete the recovery
            account.updateRecovery(userId, secret, password, password)
                .then(() => {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                })
                .catch(error => {
                    document.getElementById('errorMessage').textContent = 'Fehler beim Zurücksetzen des Passworts: ' + error.message;
                    document.getElementById('errorMessage').style.display = 'block';
                });
        }
    </script>
</body>
</html>
