<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLRG Landau - Passwort zurücksetzen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }
        h1 {
            color: #003370; /* DLRG blue */
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #003370; /* DLRG blue */
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #002255;
        }
        .message {
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #003370;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Passwort zurücksetzen</h1>
        <p>Bitte geben Sie ein neues Passwort ein.</p>
        
        <div id="resetForm">
            <div class="form-group">
                <label for="password">Neues Passwort</label>
                <input type="password" id="password" minlength="8" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Passwort bestätigen</label>
                <input type="password" id="confirmPassword" minlength="8" required>
            </div>
            <button type="button" onclick="resetPassword()">Passwort zurücksetzen</button>
        </div>
        
        <div id="loadingIndicator" class="loading">
            <div class="spinner"></div>
            <p>Passwort wird zurückgesetzt...</p>
        </div>
        
        <div id="successMessage" class="message success" style="display: none;">
            Ihr Passwort wurde erfolgreich zurückgesetzt. Sie können sich jetzt mit Ihrem neuen Passwort anmelden.
        </div>
        
        <div id="errorMessage" class="message error" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@11.0.0"></script>
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const secret = urlParams.get('secret');
        
        if (!userId || !secret) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('errorMessage').textContent = 'Ungültiger Link. Bitte fordern Sie einen neuen Reset-Link an.';
            document.getElementById('errorMessage').style.display = 'block';
        }
        
        function showLoading() {
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
        }
        
        function hideLoading() {
            document.getElementById('loadingIndicator').style.display = 'none';
        }
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('resetForm').style.display = 'block';
        }
        
        function resetPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Clear any previous error messages
            document.getElementById('errorMessage').style.display = 'none';
            
            if (password !== confirmPassword) {
                showError('Die Passwörter stimmen nicht überein.');
                return;
            }
            
            if (password.length < 8) {
                showError('Das Passwort muss mindestens 8 Zeichen lang sein.');
                return;
            }
            
            showLoading();
            
            // Initialize Appwrite
            const { Client, Account } = Appwrite;
            
            const client = new Client();
            
            // Set the endpoint to your Appwrite server
            client
                .setEndpoint('http://89.58.51.96/v1') // Your Appwrite server address with /v1
                .setProject('67dd9c47001a0503d8b6'); // Your Appwrite project ID
            
            const account = new Account(client);
            
            // Log for debugging
            console.log('Resetting password for user ID:', userId);
            console.log('With secret:', secret);
            
            // Complete the recovery
            account.updateRecovery(userId, secret, password, password)
                .then(() => {
                    hideLoading();
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    console.log('Password reset successful');
                })
                .catch(error => {
                    hideLoading();
                    console.error('Password reset error:', error);
                    showError('Fehler beim Zurücksetzen des Passworts: ' + (error.message || error.toString()));
                });
        }
    </script>
</body>
</html>
