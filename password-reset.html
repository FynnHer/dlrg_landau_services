<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLRG Landau - Passwort zurücksetzen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }
        h1 {
            color: #003370; /* DLRG blue */
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #003370; /* DLRG blue */
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #002255;
        }
        .message {
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.dlrg.de/fileadmin/user_upload/DLRG-Logo.png" alt="DLRG Logo" class="logo">
        <h1>Passwort zurücksetzen</h1>
        <p>Bitte geben Sie ein neues Passwort ein.</p>
        
        <div id="resetForm">
            <div class="form-group">
                <label for="password">Neues Passwort</label>
                <input type="password" id="password" minlength="8" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Passwort bestätigen</label>
                <input type="password" id="confirmPassword" minlength="8" required>
            </div>
            <button type="button" id="resetButton">Passwort zurücksetzen</button>
        </div>
        
        <div id="successMessage" class="message success" style="display: none;">
            Ihr Passwort wurde erfolgreich zurückgesetzt. Sie können sich jetzt mit Ihrem neuen Passwort anmelden.
        </div>
        
        <div id="errorMessage" class="message error" style="display: none;"></div>
    </div>

    <!-- Load the Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get elements
            const resetForm = document.getElementById('resetForm');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const resetButton = document.getElementById('resetButton');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            // Parse URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId');
            const secret = urlParams.get('secret');
            
            console.log('URL Parameters:', {
                userId: userId,
                secretProvided: secret ? true : false
            });
            
            // Check if the URL has valid parameters
            if (!userId || !secret) {
                resetForm.style.display = 'none';
                errorMessage.textContent = 'Ungültiger Link. Bitte fordern Sie einen neuen Reset-Link an.';
                errorMessage.style.display = 'block';
                console.error('Missing URL parameters:', { userId, secret });
                return;
            }
            
            // Add click event to reset button
            resetButton.addEventListener('click', function() {
                resetPassword();
            });
            
            // Reset password function
            function resetPassword() {
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // Clear previous error messages
                errorMessage.style.display = 'none';
                
                // Validate passwords
                if (password !== confirmPassword) {
                    errorMessage.textContent = 'Die Passwörter stimmen nicht überein.';
                    errorMessage.style.display = 'block';
                    return;
                }
                
                if (password.length < 8) {
                    errorMessage.textContent = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
                    errorMessage.style.display = 'block';
                    return;
                }
                
                // Show loading state
                resetButton.disabled = true;
                resetButton.textContent = 'Wird verarbeitet...';
                
                // Initialize Appwrite
                const { Client, Account } = Appwrite;
                
                const client = new Client();
                client
                    .setEndpoint('http://89.58.51.96/v1') // Your Appwrite API endpoint
                    .setProject('67dd9c47001a0503d8b6'); // Your Appwrite project ID
                
                const account = new Account(client);
                
                console.log('Attempting to reset password with:', { 
                    userId, 
                    passwordLength: password.length,
                    endpoint: 'http://89.58.51.96/v1',
                    projectId: '67dd9c47001a0503d8b6'
                });
                
                // Complete the recovery
                account.updateRecovery(userId, secret, password, password)
                    .then(response => {
                        console.log('Password reset successful:', response);
                        
                        // Show success message
                        resetForm.style.display = 'none';
                        successMessage.style.display = 'block';
                    })
                    .catch(error => {
                        console.error('Password reset failed:', error);
                        
                        // Extract error message
                        let errorText = 'Ein Fehler ist aufgetreten.';
                        if (error && error.message) {
                            errorText = `Fehler: ${error.message}`;
                        } else if (typeof error === 'string') {
                            errorText = `Fehler: ${error}`;
                        }
                        
                        // Check for CORS or network issues
                        if (error instanceof TypeError && error.toString().includes('NetworkError')) {
                            errorText = 'Netzwerkfehler: Verbindung zum Server fehlgeschlagen. Bitte kontaktieren Sie den Administrator.';
                        }
                        
                        // Show error message
                        errorMessage.textContent = errorText;
                        errorMessage.style.display = 'block';
                        
                        // Reset button state
                        resetButton.disabled = false;
                        resetButton.textContent = 'Passwort zurücksetzen';
                    });
            }
        });
    </script>
</body>
</html>
